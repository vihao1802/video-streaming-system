services:
  client:
    container_name: client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    env_file:
      - ./client/.env
    networks:
      - app-network

  server:
    container_name: server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy   # wait for postgres to be healthy
      minio:
        condition: service_started
      message-queue:
        condition: service_started
    networks:
      - app-network

  transcoder: # aka consumer
    container_name: transcoder
    build:
      context: ./transcoder
      dockerfile: Dockerfile
    restart: on-failure:5
    volumes:
      - ./transcoder:/app
    env_file:
      - ./transcoder/.env
    depends_on:
      - minio
      - message-queue
    networks:
      - app-network

  message-queue:
    image: "apache/kafka:latest"
    container_name: message-queue
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://message-queue:9092,EXTERNAL://localhost:9094
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@message-queue:9093
      KAFKA_LISTENERS: PLAINTEXT://message-queue:9092,CONTROLLER://message-queue:9093,EXTERNAL://message-queue:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: video_streaming
    networks:
      - app-network

  message-queue-ui:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: message-queue-ui
    restart: on-failure:3
    ports:
      - "8081:8080"
    environment:
      KAFKA_BROKERS: message-queue:9092
    depends_on:
      - message-queue
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine # PostgreSQL version 15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_streaming
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d video_streaming"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 12345678
      MINIO_NOTIFY_KAFKA_ENABLE_1: "on"
      MINIO_NOTIFY_KAFKA_BROKERS_1: "message-queue:9092"
      MINIO_NOTIFY_KAFKA_TOPIC_1: "video-uploaded"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  minio-setup:
    image: minio/mc
    container_name: minio-setup
    depends_on:
      - minio
      - message-queue
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to start...';
      until /usr/bin/mc alias set myminio http://minio:9000 admin 12345678 > /dev/null 2>&1; do
        sleep 1;
      done;
      echo 'MinIO is ready. Configuring bucket and events...';
      /usr/bin/mc mb myminio/raw-videos --ignore-existing > /dev/null 2>&1;
      /usr/bin/mc event add myminio/raw-videos arn:minio:sqs::1:kafka --event put > /dev/null 2>&1 || true;
      echo 'MinIO setup complete.';
      "
    networks:
      - app-network

volumes:
  postgres_data:
  minio_data:

networks:
  app-network:
    driver: bridge
